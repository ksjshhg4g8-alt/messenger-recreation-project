    <script>
      // Аварийная очистка старого service worker и кэша — он вызывал
      // циклические перезагрузки и ошибки "сеть недоступна" на домене.
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var had = regs.length > 0;
              regs.forEach(function (r) { r.unregister(); });
              if (window.caches && caches.keys) {
                caches.keys().then(function (keys) {
                  keys.forEach(function (k) { caches.delete(k); });
                });
              }
              if (had && !sessionStorage.getItem("sw_cleaned")) {
                sessionStorage.setItem("sw_cleaned", "1");
                window.location.reload();
              }
            });
          }
        } catch (e) {}
      })();
    </script>
