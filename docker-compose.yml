# Поднимает весь проект одной командой:  docker compose up -d
# Сервисы: база данных (db), сервер функций (server), сайт (web).

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-appdb}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_BOT_USERNAME: ${MAX_BOT_USERNAME:-}

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Сайт обращается к серверу через тот же домен по пути /api
        VITE_API_BASE: /api
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  pgdata:
